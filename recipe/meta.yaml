{% set python_min = "3.10" %}
{% set name = "primod" %}
{% set version = "2026.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/primod-{{ version }}.tar.gz
  sha256: 2b0ce219b1f4f825ab7129cedae6b080b9ce2046bc33cb60b4de2f03e127a06d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - geopandas
    - imod
    - numpy
    - pandas
    - pydantic
    - ribasim
    - tomli-w
    - xarray
    - scipy

test:
  imports:
    - primod
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://deltares.github.io/iMOD-Documentation/coupler.html
  summary: Pre-process iMOD Coupler
  dev_url: https://github.com/Deltares/imod_coupler/pre-processing
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - deltares-service-account
    - JoerivanEngelen
    - Hofer-Julian
    - Huite
    - visr
